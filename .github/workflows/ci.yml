name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  checks:
    name: Frontend and Compose checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check frontend JavaScript syntax
        run: node --check src/main/resources/static/app.js

      - name: Run frontend behavior tests
        run: node --test src/test/js/evidenceRendering.test.mjs src/test/js/incidentFrontendActions.test.mjs

      - name: Validate Docker Compose configuration
        env:
          DASHSCOPE_API_KEY: ci-placeholder
          MINIO_ROOT_USER: ci-minio
          MINIO_ROOT_PASSWORD: ci-minio-password
          POSTGRES_PASSWORD: ci-postgres
          APP_API_TOKEN: ci-api-token
          APP_WEBHOOK_SECRET: ci-webhook-secret
          APP_INCIDENT_JDBC_PASSWORD: ci-postgres
        run: docker compose config --quiet

  maven:
    name: Maven verification and PostgreSQL integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build, analyze, and run integration tests
        env:
          # Tests use mocks/Testcontainers; never expose a production API key to CI.
          DASHSCOPE_API_KEY: ci-placeholder
        run: |
          docker info
          mvn -B -ntp -Ppostgres-it verify

      - name: Ensure PostgreSQL integration tests executed
        run: |
          report=target/failsafe-reports/TEST-org.example.integration.PostgresqlDurableWorkflowIT.xml
          test -f "$report"
          ! rg -q 'skipped="[1-9][0-9]*"' "$report"

      - name: Upload Maven reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-test-and-quality-reports
          path: |
            target/surefire-reports/**
            target/failsafe-reports/**
            target/site/**
            target/spotbugsXml.xml
          if-no-files-found: ignore

  container:
    name: Container image build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build application image
        run: docker build --tag super-biz-agent:ci .
