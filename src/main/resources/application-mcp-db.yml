spring:
  ai:
    mcp:
      client:
        enabled: ${MCP_CLIENT_ENABLED:true}
        name: superbizagent-mcp-client
        version: 1.0.0
        type: sync
        request-timeout: ${MCP_REQUEST_TIMEOUT:60s}
        stdio:
          connections:
            dbhub:
              command: ${MCP_DBHUB_COMMAND:npx}
              args:
                - -y
                - "${MCP_DBHUB_PACKAGE:@bytebase/dbhub@0.21.2}"
                - --transport
                - stdio
                - --config
                - ${MCP_DBHUB_CONFIG:./config/dbhub.toml}
