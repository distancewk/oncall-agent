server:
  port: 9900
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

file:
  upload:
    path: ${FILE_UPLOAD_PATH:./uploads}
    allowed-extensions: txt,md

milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}
  username: ""
  password: ""
  database: default
  timeout: 10000

# Spring AI Alibaba DashScope 配置
spring:
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          timeout: 180000  # 超时时间180秒（3分钟）
      retry:
        max-attempts: 3  # 最大重试次数
        backoff:
          initial-interval: 2000  # 初始重试间隔2秒
          multiplier: 2  # 重试间隔倍数
          max-interval: 10000  # 最大重试间隔10秒
    
    # Spring AI MCP 客户端配置（当前已禁用，如需启用请设置 enabled: true 并配置相应连接）
    mcp:
      client:
        enabled: false

  # Redis 配置
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 3000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  flyway:
    enabled: false

# 自定义应用级配置（暂无）

# 阿里云 DashScope Embedding API 配置
dashscope:
  api:
    key: ${DASHSCOPE_API_KEY}
  base-url: https://dashscope.aliyuncs.com/api/v1
  rerank:
    url: https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank
    model: gte-rerank
  embedding:
    model: text-embedding-v4  # 阿里云文本向量化模型

# 文档分片配置
document:
  chunk:
    max-size: 800  # 每个分片最大字符数
    overlap: 100   # 分片之间的重叠字符数

# RAG 配置
rag:
  candidate-k: 10  # 混合检索粗排获取的候选文档数
  top-k: 3  # 检索返回的最相似文档数量
  search-ef: ${RAG_SEARCH_EF:64}
  model: "qwen3-max"  # 大语言模型名称

# Prometheus 配置
prometheus:
  base-url: ${PROMETHEUS_BASE_URL:http://localhost:9090}
  timeout: 10  # 超时时间（秒）
  mock-enabled: ${PROMETHEUS_MOCK_ENABLED:false}  # 是否启用 Mock 模式（用于测试）

# CLS 云日志服务配置
cls:
  mock-enabled: ${CLS_MOCK_ENABLED:false}  # 是否启用 Mock 模式（用于测试，设为 true 返回与告警关联的模拟日志数据）
  base-url: ${CLS_BASE_URL:}
  query-path: ${CLS_QUERY_PATH:/api/v1/logs/query}
  api-key: ${CLS_API_KEY:}
  timeout: ${CLS_TIMEOUT:10}

app:
  jobs:
    enabled: ${APP_JOBS_ENABLED:true}
    poll-delay-millis: ${APP_JOB_POLL_DELAY_MILLIS:1000}
    lease-duration-millis: ${APP_JOB_LEASE_DURATION_MILLIS:60000}
    heartbeat-interval-millis: ${APP_JOB_HEARTBEAT_INTERVAL_MILLIS:15000}
    recovery-delay-millis: ${APP_JOB_RECOVERY_DELAY_MILLIS:15000}
    worker-concurrency: ${APP_JOB_WORKER_CONCURRENCY:4}
    diagnosis-max-attempts: ${APP_JOB_DIAGNOSIS_MAX_ATTEMPTS:2}
    diagnosis-prefetch-concurrency: ${APP_JOB_DIAGNOSIS_PREFETCH_CONCURRENCY:4}
    index-max-attempts: ${APP_JOB_INDEX_MAX_ATTEMPTS:3}
  chat:
    direct-model-routing-enabled: ${APP_DIRECT_MODEL_ROUTING_ENABLED:true}
  resilience:
    enabled: ${APP_RESILIENCE_ENABLED:true}
    default-config:
      failure-rate-threshold: ${APP_RESILIENCE_FAILURE_RATE_THRESHOLD:50}
      slow-call-rate-threshold: ${APP_RESILIENCE_SLOW_CALL_RATE_THRESHOLD:50}
      slow-call-duration: ${APP_RESILIENCE_SLOW_CALL_DURATION:5s}
      minimum-calls: ${APP_RESILIENCE_MINIMUM_CALLS:5}
      permitted-half-open-calls: ${APP_RESILIENCE_HALF_OPEN_CALLS:2}
      open-duration: ${APP_RESILIENCE_OPEN_DURATION:30s}
      retry-max-attempts: ${APP_RESILIENCE_RETRY_MAX_ATTEMPTS:1}
      retry-wait-duration: ${APP_RESILIENCE_RETRY_WAIT_DURATION:300ms}
    instances:
      prometheus:
        minimum-calls: 3
        open-duration: 20s
        retry-max-attempts: ${APP_PROMETHEUS_RETRY_MAX_ATTEMPTS:2}
        retry-wait-duration: ${APP_PROMETHEUS_RETRY_WAIT_DURATION:300ms}
      cls-logs:
        minimum-calls: 3
        open-duration: 30s
        retry-max-attempts: ${APP_CLS_RETRY_MAX_ATTEMPTS:2}
        retry-wait-duration: ${APP_CLS_RETRY_WAIT_DURATION:300ms}
      dashscope-chat:
        minimum-calls: 5
        slow-call-duration: 30s
        open-duration: 60s
      dashscope-embedding:
        minimum-calls: 5
        open-duration: 60s
      milvus:
        minimum-calls: 3
        open-duration: 30s
      mcp-tavily:
        minimum-calls: 2
        open-duration: 60s
        retry-max-attempts: ${APP_MCP_TAVILY_RETRY_MAX_ATTEMPTS:2}
        retry-wait-duration: ${APP_MCP_TAVILY_RETRY_WAIT_DURATION:500ms}
      mcp-dbhub:
        minimum-calls: 2
        open-duration: 60s
        retry-max-attempts: ${APP_MCP_DBHUB_RETRY_MAX_ATTEMPTS:2}
        retry-wait-duration: ${APP_MCP_DBHUB_RETRY_WAIT_DURATION:500ms}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:9900,http://127.0.0.1:9900}
  network:
    trusted-proxies: ${APP_TRUSTED_PROXIES:}
  security:
    enabled: ${APP_SECURITY_ENABLED:true}
    api-token: ${APP_API_TOKEN:}
    webhook-secret: ${APP_WEBHOOK_SECRET:}
    session-ttl-seconds: ${APP_SECURITY_SESSION_TTL_SECONDS:28800}
    cookie-secure: ${APP_SECURITY_COOKIE_SECURE:false}
  alerts:
    simulate-enabled: ${APP_ALERT_SIMULATE_ENABLED:false}
  chat-history:
    path: ${APP_CHAT_HISTORY_PATH:./data/chat-history}
  incidents:
    path: ${APP_INCIDENTS_PATH:./data/incidents}
    jdbc-url: ${APP_INCIDENT_JDBC_URL:jdbc:postgresql://localhost:5432/superbizagent}
    jdbc-username: ${APP_INCIDENT_JDBC_USERNAME:superbizagent}
    jdbc-password: ${APP_INCIDENT_JDBC_PASSWORD:}
    jdbc-driver-class-name: ${APP_INCIDENT_JDBC_DRIVER_CLASS_NAME:}
    jdbc-maximum-pool-size: ${APP_INCIDENT_JDBC_MAX_POOL_SIZE:10}
    jdbc-minimum-idle: ${APP_INCIDENT_JDBC_MIN_IDLE:1}
    jdbc-connection-timeout-millis: ${APP_INCIDENT_JDBC_CONNECTION_TIMEOUT_MILLIS:5000}
    jdbc-initialization-fail-timeout-millis: ${APP_INCIDENT_JDBC_INITIALIZATION_FAIL_TIMEOUT_MILLIS:-1}
    diagnosis-reuse-enabled: ${APP_DIAGNOSIS_REUSE_ENABLED:true}
    diagnosis-reuse-window-millis: ${APP_DIAGNOSIS_REUSE_WINDOW_MILLIS:3600000}
    tool-call-deduplication-enabled: ${APP_TOOL_CALL_DEDUPLICATION_ENABLED:true}
    query-logs-max-calls-per-run: ${APP_QUERY_LOGS_MAX_CALLS_PER_RUN:3}
    query-internal-docs-max-calls-per-run: ${APP_QUERY_INTERNAL_DOCS_MAX_CALLS_PER_RUN:3}
    tavily-max-calls-per-run: ${APP_TAVILY_MAX_CALLS_PER_RUN:2}
    dbhub-max-calls-per-run: ${APP_DBHUB_MAX_CALLS_PER_RUN:2}
    max-tool-calls-per-run: ${APP_MAX_TOOL_CALLS_PER_RUN:12}
    stale-run-timeout-millis: ${APP_STALE_RUN_TIMEOUT_MILLIS:600000}
    stale-run-sweep-delay-millis: ${APP_STALE_RUN_SWEEP_DELAY_MILLIS:60000}
  memory:
    private-recall-enabled: ${APP_PRIVATE_MEMORY_RECALL_ENABLED:true}
    private-recall-gating-enabled: ${APP_PRIVATE_MEMORY_RECALL_GATING_ENABLED:true}
    private-recall-top-k: ${APP_PRIVATE_MEMORY_RECALL_TOP_K:3}
    private-recall-min-score: ${APP_PRIVATE_MEMORY_RECALL_MIN_SCORE:0.0}
    private-recall-max-prompt-chars: ${APP_PRIVATE_MEMORY_RECALL_MAX_PROMPT_CHARS:1200}
    extraction-debounce-millis: ${APP_MEMORY_EXTRACTION_DEBOUNCE_MILLIS:5000}
    extraction-batch-size: ${APP_MEMORY_EXTRACTION_BATCH_SIZE:6}
    extraction-max-queue-messages: ${APP_MEMORY_EXTRACTION_MAX_QUEUE_MESSAGES:100}
    extraction-max-prompt-chars: ${APP_MEMORY_EXTRACTION_MAX_PROMPT_CHARS:6000}
    extraction-max-facts: ${APP_MEMORY_EXTRACTION_MAX_FACTS:8}
