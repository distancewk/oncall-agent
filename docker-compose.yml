services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - app-network

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - app-network

  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.5.10
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
    ports:
      - "127.0.0.1:19530:19530"
      - "127.0.0.1:9091:9091"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app-network

  attu:
    container_name: milvus-attu
    image: zilliz/attu:v2.5
    environment:
      MILVUS_URL: milvus:19530
    depends_on:
      - milvus
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    container_name: superbiz-postgres
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-superbizagent}
      POSTGRES_USER: ${POSTGRES_USER:-superbizagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-superbizagent} -d $${POSTGRES_DB:-superbizagent}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: session-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  app:
    build: .
    container_name: super-biz-agent
    ports:
      - "9900:9900"
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PROMETHEUS_BASE_URL: ${PROMETHEUS_BASE_URL:-http://prometheus:9090}
      PROMETHEUS_MOCK_ENABLED: ${PROMETHEUS_MOCK_ENABLED:-false}
      CLS_MOCK_ENABLED: ${CLS_MOCK_ENABLED:-false}
      FILE_UPLOAD_PATH: /app/uploads
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:9900}
      APP_TRUSTED_PROXIES: ${APP_TRUSTED_PROXIES:-}
      APP_SECURITY_ENABLED: ${APP_SECURITY_ENABLED:-true}
      APP_API_TOKEN: ${APP_API_TOKEN:?APP_API_TOKEN must be set}
      APP_WEBHOOK_SECRET: ${APP_WEBHOOK_SECRET:?APP_WEBHOOK_SECRET must be set}
      APP_CHAT_HISTORY_PATH: /app/data/chat-history
      APP_INCIDENTS_PATH: /app/data/incidents
      APP_INCIDENT_JDBC_URL: ${APP_INCIDENT_JDBC_URL:-jdbc:postgresql://postgres:5432/superbizagent}
      APP_INCIDENT_JDBC_USERNAME: ${APP_INCIDENT_JDBC_USERNAME:-superbizagent}
      APP_INCIDENT_JDBC_PASSWORD: ${APP_INCIDENT_JDBC_PASSWORD:?APP_INCIDENT_JDBC_PASSWORD must be set}
      APP_JOBS_ENABLED: ${APP_JOBS_ENABLED:-true}
      APP_JOB_WORKER_CONCURRENCY: ${APP_JOB_WORKER_CONCURRENCY:-4}
      APP_PRIVATE_MEMORY_RECALL_ENABLED: ${APP_PRIVATE_MEMORY_RECALL_ENABLED:-true}
      APP_PRIVATE_MEMORY_RECALL_TOP_K: ${APP_PRIVATE_MEMORY_RECALL_TOP_K:-3}
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/uploads:/app/uploads
      - ${DOCKER_VOLUME_DIRECTORY:-.}/data/chat-history:/app/data/chat-history
      - ${DOCKER_VOLUME_DIRECTORY:-.}/data/incidents:/app/data/incidents
    depends_on:
      milvus:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
