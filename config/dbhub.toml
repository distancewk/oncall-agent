[[sources]]
id = "demo_sqlite"
description = "Safe in-memory SQLite source for local MCP startup tests"
dsn = "sqlite:///:memory:"

[[tools]]
name = "execute_sql"
source = "demo_sqlite"
readonly = true
max_rows = 200

[[tools]]
name = "search_objects"
source = "demo_sqlite"

