# DBHub configuration template.
#
# This file intentionally contains no active source. Enable the `mcp-db`
# profile only after pointing MCP_DBHUB_CONFIG to a real read-only database
# config. Do not use an in-memory SQLite demo by default: DBHub's SQLite
# connector depends on optional native package `better-sqlite3`, which may be
# unavailable in transient npx installs and can prevent the Spring app from
# starting.
#
# Example: SQLite
# [[sources]]
# id = "local_sqlite"
# description = "Local SQLite database"
# dsn = "sqlite:////absolute/path/to/app.db"
#
# [[tools]]
# name = "execute_sql"
# source = "local_sqlite"
# readonly = true
# max_rows = 200
#
# [[tools]]
# name = "search_objects"
# source = "local_sqlite"

# Example: PostgreSQL
# [[sources]]
# id = "prod_postgres"
# description = "Production PostgreSQL read-only connection"
# dsn = "postgres://readonly_user:password@postgres.example.com:5432/app?sslmode=require"
#
# [[tools]]
# name = "execute_sql"
# source = "prod_postgres"
# readonly = true
# max_rows = 200
#
# [[tools]]
# name = "search_objects"
# source = "prod_postgres"

# Example: MySQL
# [[sources]]
# id = "prod_mysql"
# description = "Production MySQL read-only connection"
# dsn = "mysql://readonly_user:password@mysql.example.com:3306/app"
#
# [[tools]]
# name = "execute_sql"
# source = "prod_mysql"
# readonly = true
# max_rows = 200
#
# [[tools]]
# name = "search_objects"
# source = "prod_mysql"

# Example: MariaDB
